name: Manual Playwright Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-playwright-smoke-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  playwright-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npm run e2e:install -- --with-deps

      - name: Run Playwright smoke suite
        run: npm run e2e:smoke

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manual-playwright-smoke-diagnostics
          path: |
            .artifacts/**
            test-results/**
            playwright-report/**
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7
